<aside class="sidebar">
  <section class="sidebar-section">
    <h3>最新文章</h3>
    <ul class="post-list">
      {% assign recent_posts = site.posts | slice: 0, 8 %}
      {% for post in recent_posts %}
      <li>
        <a href="{{ post.url | relative_url }}" {% if page.url == post.url %}class="active"{% endif %}>
          <span class="post-list-title">{{ post.title }}</span>
          <span class="post-list-date">{{ post.date | date: "%m/%d" }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </section>

  <section class="sidebar-section">
    <h3>分類</h3>
    <ul class="category-list">
      <li><a href="{{ '/music-reviews' | relative_url }}">音樂記錄</a></li>
      <li><a href="{{ '/reflections' | relative_url }}">個人心得</a></li>
      <li><a href="{{ '/life' | relative_url }}">生活紀錄</a></li>
    </ul>
  </section>

  <section class="sidebar-section">
    <h3>社群媒體</h3>
    <div class="social-links">
      <a href="https://x.com/TediousMan1127" target="_blank" rel="noopener" class="social-link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <span>@TediousMan1127</span>
      </a>
    </div>
  </section>

  <section class="sidebar-section visitor-stats">
    <h3>訪客統計</h3>
    <div class="visitor-counter">
      <div class="visitor-item">
        <span class="visitor-label">今日訪客</span>
        <span class="visitor-count" id="today_visitor_count">--</span>
      </div>
      <div class="visitor-item" id="busuanzi_container_site_pv" style="display:none;">
        <span class="visitor-label">本站總瀏覽</span>
        <span class="visitor-count" id="busuanzi_value_site_pv">0</span>
      </div>
      <div class="visitor-item" id="busuanzi_container_site_uv" style="display:none;">
        <span class="visitor-label">本站總訪客</span>
        <span class="visitor-count" id="busuanzi_value_site_uv">0</span>
      </div>
    </div>

    <!-- Firebase 今日訪客精確計數 -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
      import { getDatabase, ref, runTransaction, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

      const firebaseConfig = {
        apiKey: "AIzaSyDUTVITEnxscPQadv0qbL33lRuPU-ClZU8",
        authDomain: "my-blog-counter-76b39.firebaseapp.com",
        databaseURL: "https://my-blog-counter-76b39-default-rtdb.firebaseio.com",
        projectId: "my-blog-counter-76b39",
        storageBucket: "my-blog-counter-76b39.firebasestorage.app",
        messagingSenderId: "236902134298",
        appId: "1:236902134298:web:63d4f1871717bf7dca17a3"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // 取得今天日期（台灣時區）
      const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
      const todayRef = ref(db, 'visitors/' + today);

      // 每個 session 只計算一次
      if (!sessionStorage.getItem('visited_' + today)) {
        sessionStorage.setItem('visited_' + today, '1');
        runTransaction(todayRef, (current) => (current || 0) + 1);
      }

      // 即時顯示今日訪客數
      onValue(todayRef, (snapshot) => {
        const count = snapshot.val() || 0;
        document.getElementById('today_visitor_count').textContent = count;
      });
    </script>
  </section>
</aside>
