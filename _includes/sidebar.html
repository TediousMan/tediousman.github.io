<aside class="sidebar">
  <section class="sidebar-section">
    <h3>最新文章</h3>
    <ul class="post-list">
      {% assign recent_posts = site.posts | slice: 0, 8 %}
      {% for post in recent_posts %}
      <li>
        <a href="{{ post.url | relative_url }}" {% if page.url == post.url %}class="active"{% endif %}>
          <span class="post-list-title">{{ post.title }}</span>
          <span class="post-list-date">{{ post.date | date: "%m/%d" }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </section>

  <section class="sidebar-section">
    <h3>分類</h3>
    <ul class="category-list">
      <li><a href="{{ '/music-reviews' | relative_url }}">樂評</a></li>
      <li><a href="{{ '/reflections' | relative_url }}">個人心得</a></li>
      <li><a href="{{ '/life' | relative_url }}">生活紀錄</a></li>
    </ul>
  </section>

  <section class="sidebar-section visitor-stats">
    <h3>訪客統計</h3>
    <div class="visitor-counter">
      <div class="visitor-item">
        <span class="visitor-label">本站總瀏覽</span>
        <span class="visitor-count" id="busuanzi_value_site_pv">--</span>
      </div>
      <div class="visitor-item">
        <span class="visitor-label">本站總訪客</span>
        <span class="visitor-count" id="busuanzi_value_site_uv">--</span>
      </div>
      <div class="visitor-item">
        <span class="visitor-label">本頁瀏覽</span>
        <span class="visitor-count" id="busuanzi_value_page_pv">--</span>
      </div>
    </div>
  </section>
</aside>
