---
layout: default
---
<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y 年 %m 月 %d 日" }}</time>
    {% if page.category %}
    <span class="post-category">{{ page.category }}</span>
    {% endif %}
  </div>
</header>

<div class="post-content">
  {{ content }}
</div>
