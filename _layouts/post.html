---
layout: default
---
<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y 年 %m 月 %d 日" }}</time>
    {% if page.category %}
    <span class="post-category">{{ page.category }}</span>
    {% endif %}
  </div>
</header>

<div class="post-content">
  {{ content }}
</div>

<section class="post-comments">
  <h3>留言區</h3>
  <script src="https://giscus.app/client.js"
    data-repo="TediousMan/tediousman.github.io"
    data-repo-id="R_kgDOQc6VpQ"
    data-category="General"
    data-category-id="DIC_kwDOQc6Vpc4C5Mit"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="dark_dimmed"
    data-lang="zh-TW"
    crossorigin="anonymous"
    async>
  </script>
</section>
