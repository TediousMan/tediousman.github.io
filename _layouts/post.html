---
layout: default
---
<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y 年 %m 月 %d 日" }}</time>
    {% if page.category %}
    <span class="post-category">{{ page.category }}</span>
    {% endif %}
  </div>
</header>

<div class="post-content">
  {{ content }}
</div>

<section class="post-comments">
  <h3>留言區</h3>
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="372929df-0e2b-4168-a42f-b882a9288583"
    data-page-id="{{ page.url }}"
    data-page-url="{{ site.url }}{{ page.url }}"
    data-page-title="{{ page.title }}"
    data-theme="dark"
  ></div>
  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  <script>
    // 自動調整 Cusdis iframe 高度
    window.addEventListener('message', function(e) {
      if (e.data && e.data.from === 'cusdis') {
        var iframe = document.querySelector('#cusdis_thread iframe');
        if (iframe && e.data.height) {
          iframe.style.height = e.data.height + 'px';
        }
      }
    });
  </script>
</section>
